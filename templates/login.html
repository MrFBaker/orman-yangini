<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Fire-EWS | Giriş</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #e2e8f0;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 8px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #f97316;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #f97316;
        }
        .form-group input::placeholder {
            color: #475569;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #f97316;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #ea580c;
        }
        .btn-login:disabled {
            background: #64748b;
            cursor: not-allowed;
        }
        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }
        .footer-text {
            margin-top: 24px;
            font-size: 11px;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">🔥</div>
            <div class="title">Fire-EWS</div>
            <div class="subtitle">Orman Yangını Erken Uyarı Sistemi</div>

            <form id="loginForm" onsubmit="return girisYap(event)">
                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="username" placeholder="Kullanıcı adınız" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label>Şifre</label>
                    <input type="password" id="password" placeholder="Şifreniz" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-login" id="btnLogin">Giriş Yap</button>
                <div class="error-msg" id="errorMsg"></div>
            </form>

            <div class="footer-text">
                FWI · Angström · Nesterov · KBDI · Carrega I87
            </div>
        </div>
    </div>

    <script>
    async function girisYap(e) {
        e.preventDefault();
        const btn = document.getElementById('btnLogin');
        const err = document.getElementById('errorMsg');
        btn.disabled = true;
        btn.textContent = 'Giriş yapılıyor...';
        err.style.display = 'none';

        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value
                })
            });
            const data = await res.json();
            if (data.ok) {
                window.location.href = '/';
            } else {
                err.textContent = data.hata || 'Hatalı giriş bilgileri';
                err.style.display = 'block';
            }
        } catch(ex) {
            err.textContent = 'Bağlantı hatası';
            err.style.display = 'block';
        }
        btn.disabled = false;
        btn.textContent = 'Giriş Yap';
    }
    </script>
</body>
</html>
